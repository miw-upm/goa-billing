server:
  port: 8083

info:
  app:
    artifact: "@project.artifactId@"
    version: "@project.version@"
    build: "@maven.build.timestamp@"

spring:
  application:
    name: goa-billing
  profiles:
    default: dev
  output:
    ansi:
      enabled: ALWAYS
  cache:
    type: none
  jackson:
    default-property-inclusion: NON_NULL
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${BASE_URL:http://localhost:8080}/api/goa-user/oauth2/jwks
# SE DEBE ELIMINAR...
      jwk-uri: http://localhost:8080/api/goa-user/oauth2/jwks
      token-uri: http://localhost:8080/api/goa-user/oauth2/token
      api-client-id: api-client-id
      api-client-secret: api-client-secret

app:
  hosting: localhost
  administration:
    name: Administración
    email: j.bernal@upm.es
  oauth2:
    token-uri: ${BASE_URL:http://localhost:8080}/api/goa-user/oauth2/token
    api-client-id: ${API_CLIENT_ID:api-client-id}
    api-client-secret: ${API_CLIENT_SECRET:api-client-secret}
  crypto:
    salt: ${APP_CRYPTO_SALT:0123456789abcdef0123456789abcde1}
    password: ${APP_CRYPTO_PASSWORD:dev-crypto-password-please-change-in-production-v1}
#    previous-salt: ${APP_CRYPTO_PREVIOUS_SALT:0123456789abcdef0123456789abcdef}
#    previous-password: ${APP_CRYPTO_PREVIOUS_PASSWORD:dev-crypto-password-please-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    es.upm: DEBUG
    org.springframework.security: WARN

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
